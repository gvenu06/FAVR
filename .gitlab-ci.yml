# FAVR Vulnerability Scan — GitLab CI/CD Template
#
# Drop this file into your repo (or include it via CI includes).
# Scans your codebase on merge requests and posts findings as MR notes.

stages:
  - security

favr-scan:
  stage: security
  image: node:20-alpine
  rules:
    - if: $CI_MERGE_REQUEST_IID
  script:
    - npm install -g @favr/cli

    # Run the scan — capture exit code without failing the step yet
    - |
      favr-scan . \
        --format sarif \
        --diff \
        --threshold high \
        --output favr.sarif \
        --no-progress \
        2>favr-stderr.log || FAVR_EXIT=$?
      FAVR_EXIT=${FAVR_EXIT:-0}

    # Post merge request note with findings summary
    - |
      if [ -f favr.sarif ]; then
        TOTAL=$(node -e "const s=JSON.parse(require('fs').readFileSync('favr.sarif','utf8'));console.log(s.runs[0].results.length)")
        ERRORS=$(node -e "const s=JSON.parse(require('fs').readFileSync('favr.sarif','utf8'));console.log(s.runs[0].results.filter(r=>r.level==='error').length)")
        WARNINGS=$(node -e "const s=JSON.parse(require('fs').readFileSync('favr.sarif','utf8'));console.log(s.runs[0].results.filter(r=>r.level==='warning').length)")

        if [ "$FAVR_EXIT" -ne 0 ]; then
          BODY="**FAVR Vulnerability Scan** ⚠️\n\n| Severity | Count |\n|----------|-------|\n| Critical/High | $ERRORS |\n| Medium | $WARNINGS |\n| **Total** | **$TOTAL** |\n\n⚠️ Scan found issues exceeding the threshold."
        else
          BODY="**FAVR Vulnerability Scan** ✅\n\nNo new vulnerabilities detected above threshold. ($TOTAL total findings)"
        fi

        # Post note to the merge request using GitLab API
        curl --fail --silent \
          --request POST \
          --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
          --data-urlencode "body=${BODY}" \
          || echo "Warning: Could not post MR note (check CI_JOB_TOKEN permissions)"
      fi

    # Fail the pipeline if threshold was exceeded
    - exit ${FAVR_EXIT}

  artifacts:
    reports:
      sast: favr.sarif
    paths:
      - favr.sarif
      - favr-stderr.log
    when: always
    expire_in: 30 days
